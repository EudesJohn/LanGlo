<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gbé Tché - L'Excellence Fon</title>
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://*.supabase.co;
      img-src 'self' data: blob: https://*.supabase.co;
      font-src 'self';
      frame-src 'none';
      object-src 'none';
    ">
    <!-- Favicon Premium SVG -->
    <link rel="icon" type="image/png" href="./icon.png">
    <!-- CSS -->
    <link rel="stylesheet" href="./src/assets/styles.css?v=5">
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <!-- Scripts CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import App from './src/App.js';

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker registered successfully!', reg.scope);
                        // Proactively check for updates on reload
                        reg.update();
                    })
                    .catch(err => console.warn('Service Worker registration failed:', err));
            });
        }

        const { createApp } = Vue;
        const app = createApp(App);
        app.mount('#app');
    </script>
</body>
</html>
